<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="helmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A5568"/>
      <stop offset="100%" stop-color="#2D3748"/>
    </linearGradient>
    <linearGradient id="visorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#63B3ED"/>
      <stop offset="100%" stop-color="#3182CE"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FED7AA"/>
      <stop offset="100%" stop-color="#FBBF7E"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square (app icon shape) -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bgGrad)"/>

  <!-- Face silhouette (neutral, universal) -->
  <ellipse cx="256" cy="280" rx="95" ry="115" fill="url(#skinGrad)"/>

  <!-- Helmet dome covering the top of the face -->
  <path d="M138 230 Q138 115 256 88 Q374 115 374 230 L374 258 L138 258 Z" 
        fill="url(#helmGrad)" stroke="#718096" stroke-width="3"/>

  <!-- Helmet crest -->
  <path d="M244 82 Q256 52 268 82" fill="none" stroke="#A0AEC0" stroke-width="7" stroke-linecap="round"/>

  <!-- Rivet details on helmet -->
  <circle cx="168" cy="220" r="5" fill="#718096"/>
  <circle cx="344" cy="220" r="5" fill="#718096"/>

  <!-- Visor slit (eyes visible) -->
  <rect x="152" y="244" width="208" height="26" rx="5" fill="#0F172A"/>
  <rect x="162" y="248" width="188" height="18" rx="3" fill="url(#visorGrad)" opacity="0.5"/>

  <!-- Cheek guards extending down the face -->
  <path d="M138 258 L128 330 Q132 360 158 365 L182 355 L182 258 Z" 
        fill="url(#helmGrad)" stroke="#718096" stroke-width="2"/>
  <path d="M374 258 L384 330 Q380 360 354 365 L330 355 L330 258 Z" 
        fill="url(#helmGrad)" stroke="#718096" stroke-width="2"/>

  <!-- Chin guard / lower face protection -->
  <path d="M158 365 Q170 400 210 415 Q240 425 256 428 Q272 425 302 415 Q342 400 354 365
           L348 358 Q338 390 300 408 Q270 418 256 420 Q242 418 212 408 Q174 390 164 358 Z" 
        fill="url(#helmGrad)" stroke="#718096" stroke-width="2" opacity="0.85"/>

  <!-- Nose hint -->
  <path d="M256 300 Q260 320 256 340 Q252 320 256 300" fill="#E8B878" opacity="0.5"/>

  <!-- Mouth area hint -->
  <path d="M238 365 Q256 372 274 365" fill="none" stroke="#D4956B" stroke-width="2" opacity="0.4"/>


</svg>

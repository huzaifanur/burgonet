name: Release Preflight

on:
  workflow_call:

jobs:
  preflight:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          package-manager-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Create Python virtual environment
        run: python -m venv .venv

      - name: Resolve virtualenv Python path
        run: echo "VENV_PY=.venv/bin/python" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |
          "$VENV_PY" -m pip install --upgrade pip
          "$VENV_PY" -m pip install -r src-sidecar/requirements.txt pytest

      - name: Verify tag matches app version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          TAURI_VERSION="$(python - <<'PY'
          import json
          with open('src-tauri/tauri.conf.json', 'r', encoding='utf-8') as handle:
              print(json.load(handle)['version'])
          PY
          )"
          CARGO_VERSION="$(python - <<'PY'
          import tomllib
          with open('src-tauri/Cargo.toml', 'rb') as handle:
              print(tomllib.load(handle)['package']['version'])
          PY
          )"

          test "${TAG_VERSION}" = "${PACKAGE_VERSION}"
          test "${TAG_VERSION}" = "${TAURI_VERSION}"
          test "${TAG_VERSION}" = "${CARGO_VERSION}"

      - name: Run shared checks
        run: |
          npm run check
          "$VENV_PY" -m pytest -q
          cargo check --manifest-path src-tauri/Cargo.toml

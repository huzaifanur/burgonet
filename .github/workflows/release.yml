name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight Checks
    uses: ./.github/workflows/release-preflight.yml
    secrets: inherit

  build-release:
    name: Build ${{ matrix.label }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb
            artifact_glob: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          - label: Windows x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            bundle: nsis
            artifact_glob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - label: macOS Intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            bundle: dmg
            artifact_glob: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - label: macOS Apple Silicon
            os: macos-15
            target: aarch64-apple-darwin
            bundle: dmg
            artifact_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
    uses: ./.github/workflows/release-build.yml
    with:
      label: ${{ matrix.label }}
      os: ${{ matrix.os }}
      target: ${{ matrix.target }}
      bundle: ${{ matrix.bundle }}
      artifact_glob: ${{ matrix.artifact_glob }}
    secrets: inherit

  publish-release:
    name: Publish Release
    needs: build-release
    uses: ./.github/workflows/release-publish.yml
    secrets: inherit

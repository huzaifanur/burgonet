name: Release

on:
  push:
    tags:
      - "V*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-linux:
    name: Build Linux Release
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Create Python virtual environment
        run: python -m venv .venv

      - name: Install Python dependencies
        run: |
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -r src-sidecar/requirements.txt pyinstaller pytest

      - name: Verify tag matches app version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#V}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(python -c "import tomllib; print(tomllib.load(open('src-tauri/Cargo.toml', 'rb'))['package']['version'])")"

          test "${TAG_VERSION}" = "${PACKAGE_VERSION}"
          test "${TAG_VERSION}" = "${TAURI_VERSION}"
          test "${TAG_VERSION}" = "${CARGO_VERSION}"

      - name: Run checks
        run: |
          npm run check
          .venv/bin/python -m pytest -q
          cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build Linux bundle
        run: npm run tauri -- build --bundles deb

      - name: Generate checksums
        working-directory: src-tauri/target/release/bundle/deb
        run: sha256sum Burgonet_*.deb > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Burgonet ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/deb/Burgonet_*.deb
            src-tauri/target/release/bundle/deb/SHA256SUMS.txt
